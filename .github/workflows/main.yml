name: "Build and Test"

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: laravel
          POSTGRES_USER: laravel
          POSTGRES_PASSWORD: secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: "Checkout code"
        uses: actions/checkout@v2

      - name: "Set up php"
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"

      - name: "Create .env file"
        run: cp .env.example .env

      - name: "Install dependencies"
        run: composer install --no-progress --prefer-dist
      
      - name: "Generate app key"
        run: php artisan key:generate --force

      - name: "Create test database"
        run: psql -h 127.0.0.1 -U laravel -d laravel -c "CREATE DATABASE laravel_test;"
        env:
          PGPASSWORD: secret

      - name: "Run migrations"
        run: php artisan migrate --force --env=testing
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: laravel_test
          DB_USERNAME: laravel
          DB_PASSWORD: secret

      - name: "Run tests"
        run: ./vendor/bin/pest --parallel
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: laravel_test
          DB_USERNAME: laravel
          DB_PASSWORD: secret

  deploy-staging:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'

    steps:
      - name: "Deploy to Staging EC2"
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGING_EC2_HOST }}
          username: ${{ secrets.STAGING_EC2_USER }}
          key: ${{ secrets.STAGING_EC2_SSH_KEY }}
          script: bash /var/www/laravel-staging/scripts/deploy-staging.sh

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: "Deploy to Production EC2"
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: bash /var/www/laravel/scripts/deploy.sh
