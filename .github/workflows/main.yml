name: "Build and Test"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: laravel
          POSTGRES_USER: laravel
          POSTGRES_PASSWORD: secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: "Checkout code"
        uses: actions/checkout@v2

      - name: "Set up php"
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.5"

      - name: "Create .env file"
        run: cp .env.example .env

      - name: "Install dependencies"
        run: composer install --no-progress --prefer-dist

      - name: "Set DB port for CI"
        run: sed -i 's/DB_PORT=5433/DB_PORT=5432/' .env.testing

      - name: "Create test database"
        run: psql -h 127.0.0.1 -U laravel -d laravel -c "CREATE DATABASE laravel_test;"
        env:
          PGPASSWORD: secret

      - name: "Run migrations"
        run: php artisan migrate --force --env=testing

      - name: "Run tests"
        run: ./vendor/bin/pest
